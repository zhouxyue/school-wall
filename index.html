<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>莘庄中学校园墙 · 我还记得你</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <canvas id="rainCanvas"></canvas>

        <h1>🌸 莘庄中学校园墙，我还记得你</h1>
        <p class="subtitle">校园墙我想你了😭</p>
        <div class="memorial-char">奠</div>

        <!-- 单张照片（PNG 格式，改为更大尺寸） -->
        <div class="photo-gallery">
            <img src="images/campus.png" alt="校园风景">
        </div>

        <div id="danmaku-area"></div>

        <button id="flower-btn">💐 献花</button>

        <div class="input-area">
            <input type="text" id="msg-input" placeholder="写下你想说的话...">
            <button id="send-btn">发送弹幕</button>
        </div>
    </div>

    <!-- 外部库（使用最稳定、最常用的 CDN 地址） -->
    <!-- 弹幕库：使用 unpkg 的 0.4.0 版本（该版本已被大量项目验证） -->
    <script src="https://unpkg.com/js-bullets@0.4.0/dist/BulletJs.min.js"></script>
    <!-- 撒花库：使用 jsdelivr 的 browser 专用版本（避免 ESM 问题） -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script src="script.js"></script>
</body>
</html>
