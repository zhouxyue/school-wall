<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>莘庄中学校园墙 · 我还记得你</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 哭泣雨滴 Canvas（背景） -->
        <canvas id="rainCanvas"></canvas>

        <h1>🌸 莘庄中学校园墙，我还记得你</h1>
        <p class="subtitle">校园墙我想你了😭</p>
        <div class="memorial-char">奠</div>

        <!-- 单张照片（PNG 格式，正方形） -->
        <div class="photo-gallery">
            <img src="images/campus.png" alt="校园风景">
        </div>

        <!-- 弹幕显示区 -->
        <div id="danmaku-area"></div>

        <!-- 献花按钮 -->
        <button id="flower-btn">💐 献花</button>

        <!-- 留言输入区 -->
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="写下你想说的话...">
            <button id="send-btn">发送弹幕</button>
        </div>
    </div>

    <!-- 不再依赖任何外部库，全部自包含 -->
    <script src="script.js"></script>
</body>
</html>
